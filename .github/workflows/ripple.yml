name: Ripple Enterprise Gate

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  ripple:
    name: Ripple authorization gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # --- THE FINAL, ROBUST FIX ---
- name: Ripple CI gate
  env:
    RIPPLE_API_KEY: ${{ secrets.RIPPLE_API_KEY }}
    RIPPLE_CLOUD_URL: ${{ secrets.RIPPLE_CLOUD_URL }}
  run: |
    # Clear any potentially cached npx versions to be safe
    rm -rf ~/.npm/_npx

    # Install the local packages. This will place them in node_modules
    npm install ./getripple-core-*.tgz
    npm install ./getripple-cli-*.tgz

    # Run the ripple binary DIRECTLY from the local node_modules folder.
    # This guarantees we are using the version we just installed from the .tgz file.
    ./node_modules/.bin/ripple ci --base origin/${{ github.base_ref || 'main' }} --github-annotations --sha ${{ github.event.pull_request.head.sha || github.sha }}
