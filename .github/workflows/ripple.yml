
name: Ripple Enterprise Gate

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  ripple:
    name: Ripple authorization gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          - name: Direct receipt test (bypasses CLI entirely)
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          RESULT=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RIPPLE_CLOUD_URL/api/audit" \
            -H "Authorization: Bearer $RIPPLE_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"protocol\":\"ripple-audit\",\"intentId\":\"ci-direct-${SHA:0:8}\",\"commitSha\":\"$SHA\",\"branch\":\"test\",\"actor\":\"test\",\"source\":\"ci\",\"decision\":\"continue\",\"payload\":{\"test\":true}}")
          echo "Direct audit API status: $RESULT"
          if [ "$RESULT" != "200" ]; then echo "❌ API call failed"; exit 1; fi
          echo "✅ Direct API call succeeded"
        env:
          RIPPLE_API_KEY: ${{ secrets.RIPPLE_API_KEY }}
          RIPPLE_CLOUD_URL: ${{ secrets.RIPPLE_CLOUD_URL }}

      - name: Install Ripple from local package
        run: |
          npm install -g ./getripple-core-1.0.12.tgz
          npm install -g ./getripple-cli-1.0.12.tgz

      - name: Verify API key is set
        run: node -e "console.log('API KEY SET:', !!process.env.RIPPLE_API_KEY, '| PREFIX:', process.env.RIPPLE_API_KEY?.slice(0,10))"
        env:
          RIPPLE_API_KEY: ${{ secrets.RIPPLE_API_KEY }}

      - name: Ripple CI gate
        run: ripple ci --base origin/${{ github.base_ref || 'main' }} --github-annotations --sha ${{ github.event.pull_request.head.sha || github.sha }}
        env:
          RIPPLE_API_KEY: ${{ secrets.RIPPLE_API_KEY }}
          RIPPLE_CLOUD_URL: ${{ secrets.RIPPLE_CLOUD_URL }}
