name: Ripple Enterprise Gate

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  ripple:
    name: Ripple authorization gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
     - name: Ripple CI gate
  env:
    RIPPLE_API_KEY: ${{ secrets.RIPPLE_API_KEY }}
    RIPPLE_CLOUD_URL: ${{ secrets.RIPPLE_CLOUD_URL }}
  run: |
    # Install the core package first from the local tarball
    npm install ./getripple-core-*.tgz
    # Then install the CLI package from the local tarball
    npm install ./getripple-cli-*.tgz

    # Now, run the ripple command directly from the local node_modules bin.
    # This is the most bulletproof way to ensure the correct version is used.
    ./node_modules/.bin/ripple ci --base origin/${{ github.base_ref || 'main' }} --github-annotations --sha ${{ github.event.pull_request.head.sha || github.sha }}
