name: Ripple Enterprise Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  ripple-gate:
    name: Ripple authorization gate
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the code of the PULL REQUEST itself
      - name: Checkout PR Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Checkout the ripple-main repo into a sub-directory
      - name: Checkout Ripple Main Repo
        uses: actions/checkout@v4
        with:
          repository: raushankcode/ripple # This is your tool's repo
          ref: main
          path: ./.ripple-tool # Check it out into a local directory
          token: ${{ secrets.CROSS_REPO_PAT }} # <-- THIS IS THE FIX

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build and Install Ripple from Source
        run: |
          # Navigate into the tool's source code
          cd ./.ripple-tool
          # Install dependencies and build it
          npm install
          npm run build --workspaces
          # Install the built packages globally inside the runner
          npm install -g ./packages/core
          npm install -g ./packages/cli
          # Go back to the root of the user's repo
          cd ..

      - name: Ripple CI gate
        env:
          RIPPLE_API_KEY: ${{ secrets.RIPPLE_API_KEY }}
          RIPPLE_CLOUD_URL: ${{ secrets.RIPPLE_CLOUD_URL }}
        run: |
          # Now run the globally installed 'ripple' command
          ripple ci --base origin/${{ github.base_ref || 'main' }} --github-annotations --sha ${{ github.event.pull_request.head.sha || github.sha }}
