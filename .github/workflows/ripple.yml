name: Ripple Enterprise Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  ripple-gate:
    name: Ripple authorization gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ripple CI gate
        env:
          RIPPLE_API_KEY: ${{ secrets.RIPPLE_API_KEY }}
          RIPPLE_CLOUD_URL: ${{ secrets.RIPPLE_CLOUD_URL }}
        run: |
          # Use npx to fetch and run the latest version from the public npm registry.
          # The -y flag ensures it uses the version you just published.
          npx -y @getripple/cli@latest ci --base origin/${{ github.base_ref || 'main' }} --github-annotations --sha ${{ github.event.pull_request.head.sha || github.sha }}
