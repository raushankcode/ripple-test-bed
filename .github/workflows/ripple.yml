name: Ripple Enterprise Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  # JOB 1: BUILD THE TOOL
  # This job's ONLY purpose is to build your CLI from the correct branch.
  build-ripple-cli:
    name: Build Ripple CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ripple Main Repo from Dev Branch
        uses: actions/checkout@v4
        with:
          repository: raushankcode/ripple
          ref: v13-test # <-- Ensures we get your fixed code
          path: ripple-main
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build and Pack Ripple CLI
        working-directory: ./ripple-main
        run: |
          npm install
          npm run build --workspaces
          npm pack --workspace @getripple/core
          npm pack --workspace @getripple/cli

      - name: Upload CLI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ripple-cli-packages
          path: |
            ripple-main/getripple-core-*.tgz
            ripple-main/getripple-cli-*.tgz

  # JOB 2: RUN THE GATE
  # This job ONLY runs after the build job succeeds. It uses the tool we just built.
  ripple-gate:
    name: Ripple authorization gate
    runs-on: ubuntu-latest
    needs: build-ripple-cli # <-- This is the key. It waits for Job 1 to finish.

    steps:
      - name: Checkout PR Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Ripple CLI Artifact
        uses: actions/download-artifact@v4
        with:
          name: ripple-cli-packages

      - name: Ripple CI gate
        env:
          RIPPLE_API_KEY: ${{ secrets.RIPPLE_API_KEY }}
          RIPPLE_CLOUD_URL: ${{ secrets.RIPPLE_CLOUD_URL }}
        run: |
          # Install the downloaded packages
          npm install ./getripple-core-*.tgz
          npm install ./getripple-cli-*.tgz

          # Run the gate using the locally installed binary
          ./node_modules/.bin/ripple ci --base origin/${{ github.base_ref || 'main' }} --github-annotations --sha ${{ github.event.pull_request.head.sha || github.sha }}
